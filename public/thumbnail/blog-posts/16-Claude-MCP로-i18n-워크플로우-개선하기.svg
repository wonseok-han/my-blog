<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="blob2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="55"/></filter>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="120" cy="140" r="160" fill="url(#blob1)" filter="url(#blur1)"/>
  <circle cx="520" cy="290" r="140" fill="url(#blob2)" filter="url(#blur2)"/>

  <!-- Left accent bar -->
  <rect x="48" y="120" width="4" height="160" rx="2" fill="url(#accentLine)"/>

  <!-- Badge -->
  <rect x="66" y="120" width="72" height="26" rx="13"
    fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
  <text x="102" y="138" fill="#fbbf24" font-size="12" font-weight="600"
    text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">MCP</text>

  <!-- Main title -->
  <text x="66" y="202" fill="#fafafa" font-size="44" font-weight="800"
    font-family="system-ui, -apple-system, sans-serif" letter-spacing="-1.5">Claude × i18n</text>

  <!-- Subtitle -->
  <text x="66" y="244" fill="#a1a1aa" font-size="20" font-weight="400"
    font-family="system-ui, -apple-system, sans-serif">워크플로우 자동화</text>

  <!-- Divider -->
  <line x1="66" y1="270" x2="310" y2="270" stroke="#27272a" stroke-width="1"/>

  <!-- Tags -->
  <text x="66" y="294" fill="#52525b" font-size="13"
    font-family="system-ui, -apple-system, sans-serif">Google Sheets · AWS S3 · GitLab CI</text>
</svg>

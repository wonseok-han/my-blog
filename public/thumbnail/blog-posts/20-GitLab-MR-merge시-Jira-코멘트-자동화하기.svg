<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141420"/>
    </linearGradient>
    <linearGradient id="blobJira" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1868db" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1868db" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f1f2a"/>
      <stop offset="100%" stop-color="#17171f"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1868db"/>
      <stop offset="100%" stop-color="#0d4aa8"/>
    </linearGradient>
    <filter id="softBlur"><feGaussianBlur stdDeviation="55"/></filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Ambient Jira-blue glow behind card -->
  <circle cx="300" cy="200" r="220" fill="url(#blobJira)" filter="url(#softBlur)"/>

  <!-- Jira comment card -->
  <g transform="translate(60, 56)" filter="url(#cardShadow)">
    <!-- Card body -->
    <rect width="480" height="244" rx="10" fill="url(#cardBg)" stroke="#2a2a3a" stroke-width="1"/>
    <!-- Left accent bar -->
    <rect width="3" height="244" rx="1.5" fill="url(#accentBar)"/>

    <!-- Header: avatar + name + meta -->
    <g transform="translate(22, 22)">
      <!-- Bot avatar circle -->
      <circle cx="14" cy="14" r="14" fill="#1868db"/>
      <path d="M6.5 10 L14 6 L21.5 10 L21.5 16 L14 20 L6.5 16 Z" fill="#fff" opacity="0.95"/>
      <circle cx="14" cy="13" r="2" fill="#1868db"/>

      <!-- Name & timestamp -->
      <text x="40" y="13" fill="#f4f4f5" font-size="13" font-weight="700"
        font-family="system-ui, -apple-system, sans-serif">GitLab CI Bot</text>
      <text x="40" y="28" fill="#71717a" font-size="11"
        font-family="system-ui, -apple-system, sans-serif">added a comment · just now</text>
    </g>

    <!-- Divider under header -->
    <line x1="22" y1="66" x2="458" y2="66" stroke="#27272a" stroke-width="1"/>

    <!-- MR link line -->
    <g transform="translate(22, 88)">
      <text font-family="system-ui, -apple-system, sans-serif" font-size="13">
        <tspan fill="#e4e4e7">🔀 MR: </tspan>
        <tspan fill="#60a5fa" text-decoration="underline">PROJECT-123: fix: 로그인 시 토큰 갱신 오류 수정</tspan>
      </text>
    </g>

    <!-- Assignee line -->
    <g transform="translate(22, 112)">
      <text fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="13">
        <tspan>👤 작업자: </tspan>
        <tspan fill="#e4e4e7" font-weight="600">홍길동</tspan>
      </text>
    </g>

    <!-- "변경 내용" heading -->
    <text x="22" y="148" fill="#fafafa" font-size="13" font-weight="700"
      font-family="system-ui, -apple-system, sans-serif">변경 내용</text>

    <!-- Bullet list -->
    <g font-family="system-ui, -apple-system, sans-serif" font-size="12.5">
      <circle cx="30" cy="168" r="2" fill="#71717a"/>
      <text x="40" y="172" fill="#d4d4d8">
        <tspan fill="#22c55e" font-weight="700" font-family="ui-monospace, Menlo, monospace">fix:</tspan>
        <tspan dx="4"> 로그인 시 토큰 갱신 오류 수정</tspan>
      </text>

      <circle cx="30" cy="190" r="2" fill="#71717a"/>
      <text x="40" y="194" fill="#d4d4d8">
        <tspan fill="#22c55e" font-weight="700" font-family="ui-monospace, Menlo, monospace">fix:</tspan>
        <tspan dx="4"> 관련 단위 테스트 추가</tspan>
      </text>

      <circle cx="30" cy="212" r="2" fill="#71717a"/>
      <text x="40" y="216" fill="#d4d4d8">
        <tspan fill="#a78bfa" font-weight="700" font-family="ui-monospace, Menlo, monospace">refactor:</tspan>
        <tspan dx="4"> 토큰 갱신 로직 별도 함수로 분리</tspan>
      </text>
    </g>

    <!-- Card footer: source tag -->
    <line x1="22" y1="232" x2="458" y2="232" stroke="#27272a" stroke-width="1" stroke-dasharray="2 3"/>
  </g>

  <!-- Bottom title -->
  <g transform="translate(0, 344)">
    <text x="300" y="0" fill="#fafafa" font-size="22" font-weight="800"
      text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" letter-spacing="-0.8">
      merge 하면, 코멘트는 알아서 달린다
    </text>
    <text x="300" y="26" fill="#71717a" font-size="12" font-weight="500"
      text-anchor="middle" font-family="ui-monospace, Menlo, monospace" letter-spacing="1.2">
      GITLAB CI  ·  JIRA REST API  ·  ADF
    </text>
  </g>
</svg>

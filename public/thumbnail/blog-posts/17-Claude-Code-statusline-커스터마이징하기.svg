<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1b26"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#bd93f9"/>
      <stop offset="100%" stop-color="#bd93f9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bd93f9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#bd93f9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="blob2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#50fa7b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#50fa7b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="terminalBg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#282a36"/>
      <stop offset="100%" stop-color="#1e1f2b"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="termShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#bd93f9" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="360" fill="url(#bg)"/>

  <!-- Ambient glow blobs -->
  <circle cx="100" cy="80" r="180" fill="url(#blob1)" filter="url(#blur1)"/>
  <circle cx="520" cy="300" r="150" fill="url(#blob2)" filter="url(#blur2)"/>

  <!-- Left accent bar -->
  <rect x="48" y="88" width="4" height="148" rx="2" fill="url(#accentLine)"/>

  <!-- Badge -->
  <rect x="66" y="88" width="106" height="26" rx="13"
    fill="#bd93f9" fill-opacity="0.12" stroke="#bd93f9" stroke-width="1" stroke-opacity="0.5"/>
  <text x="119" y="106" fill="#bd93f9" font-size="12" font-weight="600"
    text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Claude Code</text>

  <!-- Main title line 1 -->
  <text x="66" y="166" fill="#f8f8f2" font-size="38" font-weight="800"
    font-family="system-ui, -apple-system, sans-serif" letter-spacing="-1">Statusline</text>

  <!-- Main title line 2 -->
  <text x="66" y="208" fill="#f8f8f2" font-size="38" font-weight="800"
    font-family="system-ui, -apple-system, sans-serif" letter-spacing="-1">커스터마이징</text>

  <!-- Divider -->
  <line x1="66" y1="228" x2="320" y2="228" stroke="#44475a" stroke-width="1"/>

  <!-- Tags -->
  <text x="66" y="252" fill="#6272a4" font-size="13"
    font-family="system-ui, -apple-system, sans-serif">Shell Script · Dracula · CLI</text>

  <!-- Terminal window -->
  <rect x="330" y="50" width="232" height="258" rx="10"
    fill="url(#terminalBg)" stroke="#44475a" stroke-width="1" filter="url(#termShadow)"/>

  <!-- Terminal title bar -->
  <rect x="330" y="50" width="232" height="28" rx="10" fill="#383a4a"/>
  <rect x="330" y="64" width="232" height="14" fill="#383a4a"/>
  <!-- Traffic lights -->
  <circle cx="352" cy="64" r="5" fill="#ff5555"/>
  <circle cx="368" cy="64" r="5" fill="#ffb86c"/>
  <circle cx="384" cy="64" r="5" fill="#50fa7b"/>
  <!-- Title -->
  <text x="446" y="69" fill="#6272a4" font-size="11" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif">statusline</text>

  <!-- Divider line 1 -->
  <line x1="330" y1="84" x2="562" y2="84" stroke="#6272a4" stroke-width="0.8"/>

  <!-- Line 1: ctx bar -->
  <text x="345" y="101" fill="#f8f8f2" font-size="9.5"
    font-family="'Courier New', monospace">ctx </text>
  <text x="368" y="101" fill="#50fa7b" font-size="9.5"
    font-family="'Courier New', monospace">███</text>
  <text x="390" y="101" fill="#44475a" font-size="9.5"
    font-family="'Courier New', monospace">───────</text>
  <text x="430" y="101" fill="#f8f8f2" font-size="9.5"
    font-family="'Courier New', monospace"> 30%</text>
  <text x="455" y="101" fill="#6272a4" font-size="9.5"
    font-family="'Courier New', monospace"> │ </text>
  <text x="472" y="101" fill="#f8f8f2" font-size="9.5"
    font-family="'Courier New', monospace">⏱</text>
  <text x="484" y="101" fill="#ffb86c" font-size="9.5"
    font-family="'Courier New', monospace">█████</text>
  <text x="514" y="101" fill="#44475a" font-size="9.5"
    font-family="'Courier New', monospace">─────</text>

  <!-- Divider line 2 -->
  <line x1="330" y1="110" x2="562" y2="110" stroke="#6272a4" stroke-width="0.8"/>

  <!-- Line 2: model / project -->
  <text x="345" y="127" fill="#bd93f9" font-size="9.5"
    font-family="'Courier New', monospace">◆ Sonnet 4.6</text>
  <text x="415" y="127" fill="#6272a4" font-size="9.5"
    font-family="'Courier New', monospace"> ❯ </text>
  <text x="432" y="127" fill="#8be9fd" font-size="9.5"
    font-family="'Courier New', monospace">📁 ~/my-blog</text>

  <!-- Divider line 3 -->
  <line x1="330" y1="136" x2="562" y2="136" stroke="#6272a4" stroke-width="0.8"/>

  <!-- Line 3: ctx red bar + 7d -->
  <text x="345" y="153" fill="#6272a4" font-size="9.5"
    font-family="'Courier New', monospace">ctx </text>
  <text x="368" y="153" fill="#ff5555" font-size="9.5"
    font-family="'Courier New', monospace">████████</text>
  <text x="414" y="153" fill="#44475a" font-size="9.5"
    font-family="'Courier New', monospace">──</text>
  <text x="427" y="153" fill="#f8f8f2" font-size="9.5"
    font-family="'Courier New', monospace"> 80%</text>
  <text x="455" y="153" fill="#6272a4" font-size="9.5"
    font-family="'Courier New', monospace"> │ </text>
  <text x="472" y="153" fill="#50fa7b" font-size="9.5"
    font-family="'Courier New', monospace">█</text>
  <text x="480" y="153" fill="#44475a" font-size="9.5"
    font-family="'Courier New', monospace">─────────</text>

  <!-- Divider line 4 -->
  <line x1="330" y1="162" x2="562" y2="162" stroke="#6272a4" stroke-width="0.8"/>

  <!-- Line 4: model + project + branch -->
  <text x="345" y="179" fill="#bd93f9" font-size="9.5"
    font-family="'Courier New', monospace">◆ claude-sonnet-4-6</text>
  <text x="345" y="194" fill="#6272a4" font-size="9.5"
    font-family="'Courier New', monospace"> ❯ </text>
  <text x="362" y="194" fill="#8be9fd" font-size="9.5"
    font-family="'Courier New', monospace">📁 ~/project</text>
  <text x="432" y="194" fill="#6272a4" font-size="9.5"
    font-family="'Courier New', monospace"> ❯ </text>
  <text x="449" y="194" fill="#ff79c6" font-size="9.5"
    font-family="'Courier New', monospace">⎇ main</text>

  <!-- Divider line 5 -->
  <line x1="330" y1="203" x2="562" y2="203" stroke="#6272a4" stroke-width="0.8"/>

  <!-- Prompt line -->
  <text x="345" y="232" fill="#50fa7b" font-size="9.5"
    font-family="'Courier New', monospace">❯ </text>
  <text x="360" y="232" fill="#f8f8f2" font-size="9.5"
    font-family="'Courier New', monospace">claude</text>
  <rect x="408" y="222" width="6" height="12" rx="1" fill="#f8f8f2" opacity="0.7"/>

  <!-- Divider line 6 -->
  <line x1="330" y1="248" x2="562" y2="248" stroke="#6272a4" stroke-width="0.8"/>

  <!-- Hint text at bottom of terminal -->
  <text x="345" y="268" fill="#6272a4" font-size="9"
    font-family="system-ui, -apple-system, sans-serif">true color · jq · tput cols</text>
</svg>
